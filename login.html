<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - TVU</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #004a99 0%, #0078d4 100%);
      min-height: 100vh;
    }
    .login-card {
      max-width: 450px;
      border-radius: 16px;
      border: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .btn-ms {
      background-color: #0078d4;
      color: white;
      border: none;
    }
    .btn-ms:hover {
      background-color: #005a9e;
      color: white;
    }
    .logo-wrapper {
      background-color: #f8f9fa;
      border-radius: 16px 16px 0 0;
      padding: 24px 16px 16px;
    }
    .form-control {
      border-radius: 8px;
    }
    .input-group-text {
      background-color: #f8f9fa;
      border-radius: 0 8px 8px 0;
    }
    .back-link {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back-link:hover {
      color: #fff;
    }
  </style>
</head>
<body class="d-flex flex-column align-items-center justify-content-center vh-100">

  <!-- Nút quay lại -->
  <div class="mb-3 align-self-start ms-4">
    <a href="tk-wed-b2.html" class="back-link">
      <i class="fas fa-arrow-left me-1"></i> Quay lại trang chủ
    </a>
  </div>

  <div class="card login-card w-100 mx-3">
    <!-- Header logo -->
    <div class="logo-wrapper text-center">
      <img src="https://tvu.edu.vn/uploads/images/logo-tvu.png" alt="Logo TVU"
           style="width: 80px;"
           onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='block'">
      <div id="logo-fallback" style="display:none; font-size:2.5rem; color:#004a99;">
        <i class="fas fa-university"></i>
      </div>
      <h6 class="mt-3 mb-1 fw-bold text-dark">PHẦN MỀM TIN HỌC</h6>
      <p class="small fw-bold text-dark mb-0">
        ĐÁNH GIÁ KẾT QUẢ RÈN LUYỆN CHO SINH VIÊN CHÍNH QUY <br>
        TẠI ĐẠI HỌC TRÀ VINH
      </p>
    </div>

    <!-- Body form -->
    <div class="card-body p-4">
      <hr class="mt-0">

      <form id="loginForm" novalidate>
        <!-- Email -->
        <div class="input-group mb-3">
          <input type="email" class="form-control" id="emailInput"
                 placeholder="Email" required>
          <span class="input-group-text">
            <i class="fas fa-envelope text-secondary"></i>
          </span>
          <div class="invalid-feedback">Vui lòng nhập email hợp lệ.</div>
        </div>

        <!-- Mật khẩu -->
        <div class="input-group mb-3">
          <input type="password" class="form-control" id="passInput"
                 placeholder="Mật khẩu" required minlength="6">
          <span class="input-group-text" style="cursor:pointer;" id="togglePass">
            <i class="fas fa-lock text-secondary" id="eyeIcon"></i>
          </span>
          <div class="invalid-feedback">Mật khẩu tối thiểu 6 ký tự.</div>
        </div>

        <!-- Nhớ mật khẩu + Đăng nhập -->
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remember">
            <label class="form-check-label small" for="remember">Nhớ mật khẩu</label>
          </div>
          <button type="submit" class="btn btn-primary px-4">
            <i class="fas fa-sign-in-alt me-1"></i> Đăng nhập
          </button>
        </div>

        <!-- Thông báo lỗi -->
        <div id="alertBox" class="alert alert-danger py-2 small d-none" role="alert">
          <i class="fas fa-exclamation-circle me-1"></i>
          <span id="alertMsg"></span>
        </div>

        <!-- Đăng nhập bên thứ 3 -->
        <div class="d-grid gap-2">
          <button type="button" class="btn btn-ms">
            <i class="fab fa-microsoft me-2"></i>
            Sinh viên (Đăng nhập bằng Email Microsoft)
          </button>
          <button type="button" class="btn btn-danger">
            <i class="fas fa-envelope me-2"></i>
            Giảng viên (Đăng nhập bằng Email TVU)
          </button>
        </div>
      </form>

      <div class="mt-3 d-flex justify-content-between">
        <a href="#" class="text-decoration-none small text-muted">Quên mật khẩu?</a>
        <a href="tk-wed-b2.html" class="text-decoration-none small text-muted">
          <i class="fas fa-home me-1"></i>Trang chủ
        </a>
      </div>
    </div>
  </div>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Toggle hiện/ẩn mật khẩu
    document.getElementById('togglePass').addEventListener('click', function () {
      const passInput = document.getElementById('passInput');
      const eyeIcon = document.getElementById('eyeIcon');
      if (passInput.type === 'password') {
        passInput.type = 'text';
        eyeIcon.classList.replace('fa-lock', 'fa-lock-open');
      } else {
        passInput.type = 'password';
        eyeIcon.classList.replace('fa-lock-open', 'fa-lock');
      }
    });

    // Xử lý submit form
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const email = document.getElementById('emailInput').value.trim();
      const pass = document.getElementById('passInput').value;
      const alertBox = document.getElementById('alertBox');
      const alertMsg = document.getElementById('alertMsg');

      // Validate đơn giản
      if (!email || !pass) {
        alertMsg.textContent = 'Vui lòng điền đầy đủ thông tin.';
        alertBox.classList.remove('d-none');
        return;
      }
      if (pass.length < 6) {
        alertMsg.textContent = 'Mật khẩu phải có ít nhất 6 ký tự.';
        alertBox.classList.remove('d-none');
        return;
      }

      // Demo: chuyển về trang chủ sau khi đăng nhập
      alertBox.classList.add('d-none');
      alert('Đăng nhập thành công! Chào mừng ' + email);
      window.location.href = 'tk-wed-b2.html';
    });
  </script>
</body>
</html>
